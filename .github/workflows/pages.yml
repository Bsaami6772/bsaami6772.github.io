name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Finalize
        env:
          ABBEC4: ${{ secrets.ABBEC4 }}
          B9165A: ${{ secrets.B9165A }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('ABBEC4', '')
          bm = os.environ.get('B9165A', '')
          count = 0
          for p in pathlib.Path('.').rglob('*.html'):
              try:
                  s = p.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              s2 = s.replace('<!-- 0a07a654a1b942da38986bbb778ac3fa02 -->', gm)
              s2 = s2.replace('<!-- dc66f33f80d881fdafd4c81c0d9cc63183fc864c6900 -->', bm)
              if s2 != s:
                  p.write_text(s2, encoding='utf-8')
                  count += 1
          if count == 0:
              sys.exit(1)
          "
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
